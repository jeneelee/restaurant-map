<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>모두의맛집 지도</title>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #map { height: 80vh; width: 100%; }
    .buttons { padding: 10px; display: flex; gap: 10px; align-items: center; }
    button { padding: 8px 12px; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    .status { padding: 0 10px; font-size: 14px; color: #444; }
  </style>

  <!-- ✅ callback으로 로드 완료 후 initMap 호출 -->
  <script
    src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=7AHb6VOQ1uXCsgYEkh3jmdtvVv18Cikg717AkrTO&callback=initMap"
    defer
  ></script>
</head>

<body>
  <h2 style="padding:10px; margin:0;">모두의맛집! 지도</h2>

  <div class="buttons">
    <button id="btn-michelin" disabled>미슐랭</button>
    <button id="btn-tasty" disabled>맛있는녀석들</button>
    <span class="status" id="status">데이터 로딩 중…</span>
  </div>

  <div id="map"></div>

  <script>
    let map;
    let markers = [];
    let allData = [];
    let infoWindow;

    const SHEET_URL = "https://opensheet.elk.sh/1zNSdIdZeJuUrD56NbYCdby7QGfoRMC-WzGsLHjpKLlo/시트1";

    const $ = (id) => document.getElementById(id);
    const btnMichelin = $("btn-michelin");
    const btnTasty = $("btn-tasty");
    const statusEl = $("status");

    const norm = (v) => (v ?? "").toString().trim();

    const getSource = (p) => p.source ?? p.Source ?? p["출처"];
    const getLat    = (p) => p.lat ?? p.Lat ?? p["위도"];
    const getLng    = (p) => p.lng ?? p.Lng ?? p["경도"];
    const getName   = (p) => p.name ?? p.Name ?? p["가게명"] ?? p["상호명"] ?? "";

    // ✅ maps.js가 로드된 뒤 callback으로 호출됨
    async function initMap() {
      map = new naver.maps.Map("map", {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 12,
      });

      infoWindow = new naver.maps.InfoWindow({ content: "" });

      btnMichelin.addEventListener("click", () => showBySource("미슐랭"));
      btnTasty.addEventListener("click", () => showBySource("맛있는녀석들"));

      await loadData();

      // 데이터 로드 완료 후 버튼 활성화
      btnMichelin.disabled = false;
      btnTasty.disabled = false;
      statusEl.textContent = `데이터 ${allData.length}건 로드 완료`;

      // 원하면 최초 자동 표시
      // showBySource("미슐랭");
    }

    async function loadData() {
      try {
        const res = await fetch(SHEET_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        allData = Array.isArray(data) ? data : [];
        console.log("데이터 로드 완료", allData);
      } catch (err) {
        console.error("시트 로드 실패:", err);
        statusEl.textContent = "데이터 로드 실패 (시트 공개/URL/CORS 확인)";
        alert("데이터를 불러오지 못했습니다. 시트 공개 설정과 URL을 확인해주세요.");
      }
    }

    function clearMarkers() {
      markers.forEach((m) => m.setMap(null));
      markers = [];
      if (infoWindow) infoWindow.close();
    }

    function showBySource(type) {
      if (!allData.length) {
        alert("데이터 로딩 중입니다. 잠시 후 다시 눌러주세요.");
        return;
      }

      clearMarkers();

      const filtered = allData.filter((p) => norm(getSource(p)) === type);

      filtered.forEach((p) => {
        const lat = parseFloat(getLat(p));
        const lng = parseFloat(getLng(p));
        if (Number.isNaN(lat) || Number.isNaN(lng)) return;

        const name = norm(getName(p)) || "(이름 없음)";
        const marker = new naver.maps.Marker({
          position: new naver.maps.LatLng(lat, lng),
          map,
          title: name,
        });

        naver.maps.Event.addListener(marker, "click", () => {
          infoWindow.setContent(`
            <div style="padding:10px; max-width:240px;">
              <strong>${escapeHtml(name)}</strong><br>
              출처: ${escapeHtml(norm(getSource(p)))}
            </div>
          `);
          infoWindow.open(map, marker);
        });

        markers.push(marker);
      });

      statusEl.textContent = `${type}: ${filtered.length}건 표시`;

      if (!filtered.length) {
        console.warn("필터 결과 없음: 시트의 출처 값(공백/표기) 또는 컬럼명 확인 필요");
      }
    }

    // 간단한 XSS 방지(시트 값이 들어오므로 안전하게)
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
