<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Naver Map 최소 테스트</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #bar { padding:10px; }
    #map { width:100%; height:80vh; }
  </style>

  <!-- ✅ callback 방식(가장 단순/안정) -->
  <script>
    // 콜백 이름은 충돌 방지 위해 고유하게
    window.nmapInit = function () {
      document.getElementById("msg").textContent = "SDK OK, 지도 생성 중…";

      // 여기서 naver가 없으면 SDK 초기화 실패
      if (typeof naver === "undefined") {
        document.getElementById("msg").textContent = "SDK 호출됐지만 naver 없음(인증/차단/키 확인)";
        return;
      }

      new naver.maps.Map("map", {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 12
      });

      document.getElementById("msg").textContent = "지도 생성 완료";
    };

    // SDK 로드 실패 감지(다운로드 자체 실패)
    window.nmapError = function () {
      document.getElementById("msg").textContent = "maps.js 로드 실패(차단/네트워크/URL)";
    };
  </script>

  <script
    src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=snmf6afl0b=nmapInit"
    onerror="nmapError()"
    defer
  ></script>
</head>

<body>
  <div id="bar">상태: <b id="msg">SDK 로딩 중…</b></div>
  <div id="map"></div>
</body>
</html>
