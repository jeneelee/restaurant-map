  <script>
    const CONFIG = {
      MAPS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",
      SHEETS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",
      SPREADSHEET_ID: "1zNSdIdZeJuUrD56NbYCdby7QGfoRMC-WzGsLHjpKLlo",
      SHEET_NAME: "DB",
      CACHE_TTL_MS: 2 * 60 * 1000,
      DEFAULT_CENTER: { lat: 37.5665, lng: 126.9780 },
      DEFAULT_ZOOM: 11,
      KOREA_BOUNDS: { latMin: 33.0, latMax: 39.8, lngMin: 124.0, lngMax: 132.5 }
    };

    const RANGE_A1 = `${CONFIG.SHEET_NAME}!A1:J`;
    const CACHE_KEY = `restaurant_map_cache_v13__${CONFIG.SPREADSHEET_ID}__${CONFIG.SHEET_NAME}`;

    let map = null;
    let infoWindow = null;
    let myLocationMarker = null;
    let myLocationCircle = null;
    let currentLocation = null;

    let allRows = [];
    let markers = [];
    let selectedProgram = "";
    let sortByNearby = false;

    let currentFilteredRows = [];
    let selectedPlaceRow = null;
    let markerLookup = new Map();

    const els = {
      q: document.getElementById("q"),
      q_top_m: document.getElementById("q_top_m"),

      programChips: document.getElementById("programChips"),
      programChips_top_m: document.getElementById("programChips_top_m"),

      reloadBtn: document.getElementById("reloadBtn"),
      reloadBtn_m: document.getElementById("reloadBtn_m"),

      allBtn: document.getElementById("allBtn"),
      allBtn_m: document.getElementById("allBtn_m"),

      nearbyBtn: document.getElementById("nearbyBtn"),
      nearbyBtn_m: document.getElementById("nearbyBtn_m"),

      status: document.getElementById("status"),
      status_m: document.getElementById("status_m"),

      list: document.getElementById("list"),
      list_m: document.getElementById("list_m"),

      sheet: document.getElementById("sheet"),
      sheetHandle: document.getElementById("sheetHandle"),

      myLocationBtn: document.getElementById("myLocationBtn")
    };

    function isMobile(){
      return window.matchMedia("(max-width: 900px)").matches;
    }

    function setStatus(message){
      if (els.status) els.status.textContent = message;
      if (els.status_m) els.status_m.textContent = message;
    }

    function safeJsonParse(text){
      try { return JSON.parse(text); } catch { return null; }
    }

    function toNumber(value){
      const n = Number(String(value ?? "").trim());
      return Number.isFinite(n) ? n : null;
    }

    function uniq(values){
      return Array.from(new Set(values.filter(Boolean).map(v => String(v).trim()).filter(Boolean)));
    }

    function escapeHtml(value){
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[ch]));
    }

    function isValidKoreaLatLng(lat,lng){
      const b = CONFIG.KOREA_BOUNDS;
      return lat >= b.latMin && lat <= b.latMax && lng >= b.lngMin && lng <= b.lngMax;
    }

    function formatDistance(m){
      if (!Number.isFinite(m)) return "";
      if (m < 1000) return `${Math.round(m)}m`;
      return `${(m / 1000).toFixed(1)}km`;
    }

    function haversineDistanceMeters(lat1,lng1,lat2,lng2){
      const toRad = deg => deg * Math.PI / 180;
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function rowKey(row){
      return [row.name, row.address, row.lat, row.lng].join("||");
    }

    function getSelectedContextRows(baseRow, rows){
      if (!baseRow) return rows;

      const baseLat = toNumber(baseRow.lat);
      const baseLng = toNumber(baseRow.lng);

      if (baseLat == null || baseLng == null) return rows;

      const baseKey = rowKey(baseRow);

      const computed = rows.map(r => {
        const lat = toNumber(r.lat);
        const lng = toNumber(r.lng);

        let nearDistance = Number.POSITIVE_INFINITY;
        if (lat != null && lng != null && isValidKoreaLatLng(lat, lng)) {
          nearDistance = haversineDistanceMeters(baseLat, baseLng, lat, lng);
        }

        return {
          ...r,
          _nearDistance: nearDistance
        };
      });

      const selected = computed.find(r => rowKey(r) === baseKey) || {
        ...baseRow,
        _nearDistance: 0
      };

      const nearby = computed
        .filter(r => rowKey(r) !== baseKey && Number.isFinite(r._nearDistance))
        .sort((a, b) => a._nearDistance - b._nearDistance)
        .slice(0, 10);

      return [
        { ...selected, _nearDistance: 0, _selectedBase: true },
        ...nearby
      ];
    }

    function focusMarkerWithOffset(position){
      if (!map || !window.google || !google.maps) return;

      const projection = map.getProjection();
      if (!projection) {
        map.panTo(position);
        return;
      }

      const zoom = map.getZoom();
      const scale = Math.pow(2, zoom);

      const worldPoint = projection.fromLatLngToPoint(
        new google.maps.LatLng(position.lat, position.lng)
      );

      const mapDiv = map.getDiv();
      const mapHeight = mapDiv.offsetHeight || window.innerHeight;

      const verticalOffsetPx = mapHeight * 0.18;
      const pixelOffset = verticalOffsetPx / scale / 256;

      const newPoint = new google.maps.Point(
        worldPoint.x,
        worldPoint.y + pixelOffset
      );

      const newCenter = projection.fromPointToLatLng(newPoint);
      map.panTo(newCenter);
    }

    function selectPlace(row, shouldOpenSheet = true){
      selectedPlaceRow = row;
      applyFilter();

      const found = markerLookup.get(rowKey(row));
      if (found) {
        focusMarkerWithOffset(found.position);
        google.maps.event.addListenerOnce(map, "idle", () => {
          openInfo(found.row, found.marker);
        });
      }

      if (shouldOpenSheet && isMobile()) openSheet();
    }

    function validateConfig(){
      const missing = [];
      if (!CONFIG.MAPS_API_KEY) missing.push("MAPS_API_KEY");
      if (!CONFIG.SHEETS_API_KEY) missing.push("SHEETS_API_KEY");
      if (!CONFIG.SPREADSHEET_ID) missing.push("SPREADSHEET_ID");
      if (missing.length) throw new Error("설정값이 비어 있습니다: " + missing.join(", "));
    }

    function loadGoogleMaps(){
      return new Promise((resolve,reject) => {
        window.__initMap = () => resolve();
        const script = document.createElement("script");
        script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(CONFIG.MAPS_API_KEY)}&callback=__initMap`;
        script.async = true;
        script.onerror = () => reject(new Error("Google Maps JS 로딩 실패 (키/제한 확인)"));
        document.head.appendChild(script);
      });
    }

    function initMap(){
      map = new google.maps.Map(document.getElementById("map"), {
        center: CONFIG.DEFAULT_CENTER,
        zoom: CONFIG.DEFAULT_ZOOM,
        mapTypeControl:false,
        streetViewControl:false,
        fullscreenControl:false,
        zoomControl:false,
        gestureHandling:"greedy"
      });
      infoWindow = new google.maps.InfoWindow();
    }

    function readCache(){
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const parsed = safeJsonParse(raw);
      if (!parsed?.ts || !Array.isArray(parsed?.rows)) return null;
      if (Date.now() - parsed.ts > CONFIG.CACHE_TTL_MS) return null;
      return parsed.rows;
    }

    function writeCache(rows){
      localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), rows }));
    }

    function clearCache(){
      localStorage.removeItem(CACHE_KEY);
    }

    function formatSheetsError(status, bodyText){
      const json = safeJsonParse(bodyText);
      if (!json?.error) return `Sheets API error: ${status}\n${bodyText}`;
      return `Sheets API error: ${status}\n${json.error.message || bodyText}`;
    }

    async function fetchSheetRows({force=false} = {}){
      if (!force){
        const cached = readCache();
        if (cached) return cached;
      }

      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(CONFIG.SPREADSHEET_ID)}` +
        `/values/${encodeURIComponent(RANGE_A1)}?key=${encodeURIComponent(CONFIG.SHEETS_API_KEY)}`;

      const res = await fetch(url);
      const bodyText = await res.text();
      if (!res.ok) throw new Error(formatSheetsError(res.status, bodyText));

      const json = safeJsonParse(bodyText) || {};
      const values = json.values || [];
      if (values.length < 2){
        writeCache([]);
        return [];
      }

      const headers = (values[0] || []).map(h => String(h || "").trim().toLowerCase());
      const required = ["no","program","year","name","address","lat","lng","naver_link","google_link","note"];

      for (const k of required){
        if (!headers.includes(k)){
          throw new Error(`시트 헤더에 "${k}"가 없습니다.\n현재 헤더: ${headers.join(", ")}`);
        }
      }

      const rows = values.slice(1).map(row => {
        const obj = {};
        headers.forEach((h,i) => obj[h] = (row[i] ?? "").toString().trim());
        return obj;
      }).filter(item => item.program && item.name && item.lat && item.lng);

      writeCache(rows);
      return rows;
    }

    function syncQuery(){
      const mobileTopValue = els.q_top_m ? els.q_top_m.value : "";
      const desktopValue = els.q ? els.q.value : "";
      const value = isMobile() ? mobileTopValue : desktopValue;

      if (els.q) els.q.value = value;
      if (els.q_top_m) els.q_top_m.value = value;
    }

    function getQuery(){
      if (isMobile()){
        return (els.q_top_m?.value || "").trim().toLowerCase();
      }
      return (els.q?.value || "").trim().toLowerCase();
    }

    function clearMarkers(){
      for (const m of markers) m.setMap(null);
      markers = [];
    }

    function updateNearbyButtons(){
      if (els.nearbyBtn) els.nearbyBtn.classList.toggle("active", sortByNearby);
      if (els.nearbyBtn_m) els.nearbyBtn_m.classList.toggle("active", sortByNearby);

      const disabled = !currentLocation;
      if (els.nearbyBtn) els.nearbyBtn.disabled = disabled;
      if (els.nearbyBtn_m) els.nearbyBtn_m.disabled = disabled;
    }

    function buildMapLinks(row){
      const naver = (row.naver_link || "").trim();
      const google = (row.google_link || "").trim();

      let html = `<div class="infoLinks">`;
      if (naver) html += `<a class="infoLinkBtn" href="${escapeHtml(naver)}" target="_blank" rel="noopener">네이버지도 열기</a>`;
      if (google) html += `<a class="infoLinkBtn" href="${escapeHtml(google)}" target="_blank" rel="noopener">구글지도 열기</a>`;
      html += `</div>`;
      return html;
    }

    function openInfo(row, marker){
      const linkHtml = buildMapLinks(row);

      const html = `
        <div style="min-width:240px;max-width:360px;">
          <div style="font-weight:900;font-size:15px;">${escapeHtml(row.name || "")}</div>
          <div style="color:#6b7280;font-size:12px;margin-top:4px;">
            ${escapeHtml(row.program || "")}${row.year ? " · " + escapeHtml(row.year) : ""}
          </div>
          ${row.address ? `<div style="margin-top:6px;">${escapeHtml(row.address)}</div>` : ""}
          ${row.note ? `<div style="margin-top:6px;color:#374151;">${escapeHtml(row.note)}</div>` : ""}
          ${linkHtml}
        </div>
      `;

      infoWindow.setContent(html);
      infoWindow.open({ map, anchor: marker });
    }

    function createCardElement(row, position, marker){
      const div = document.createElement("div");
      div.className = `card${row._selectedBase ? " selected" : ""}`;

      let badgeHtml = "";
      if (row._selectedBase) {
        badgeHtml = `<div class="selectedBadge">선택한 식당</div>`;
      } else if (Number.isFinite(row._nearDistance)) {
        badgeHtml = `<div class="distanceBadge">${escapeHtml(formatDistance(row._nearDistance))}</div>`;
      } else if (Number.isFinite(row._distance)) {
        badgeHtml = `<div class="distanceBadge">${escapeHtml(formatDistance(row._distance))}</div>`;
      }

      div.innerHTML = `
        <div class="cardTop">
          <div class="cardTitle">${escapeHtml(row.name || "(가게명없음)")}</div>
          ${badgeHtml}
        </div>
        <div class="cardSub">${escapeHtml(row.program || "")}</div>
        <div class="cardYear">${row.year ? escapeHtml(row.year) : ""}</div>
        <div class="meta">${escapeHtml(row.address || "")}</div>
        ${row.note ? `<div class="meta">${escapeHtml(row.note)}</div>` : ""}
      `;

      div.addEventListener("click", () => {
        map.setZoom(Math.max(map.getZoom(), 15));
        selectPlace(row, true);
      });

      return div;
    }

    function renderProgramChips(){
      const programs = uniq(allRows.map(r => r.program)).sort((a,b) => a.localeCompare(b,"ko"));

      const buildChip = (label, active, onClick) => {
        const el = document.createElement("span");
        el.className = `chip${active ? " active" : ""}`;
        el.textContent = label;
        el.addEventListener("click", onClick);
        return el;
      };

      if (els.programChips) els.programChips.innerHTML = "";
      if (els.programChips_top_m) els.programChips_top_m.innerHTML = "";

      for (const p of programs){
        if (els.programChips){
          els.programChips.appendChild(buildChip(p, selectedProgram===p, () => toggleProgram(p)));
        }
        if (els.programChips_top_m){
          els.programChips_top_m.appendChild(buildChip(p, selectedProgram===p, () => toggleProgram(p)));
        }
      }
    }

    function toggleProgram(program){
      selectedProgram = (selectedProgram === program) ? "" : program;
      renderProgramChips();
      applyFilter();
    }

    function applyFilter(){
      syncQuery();
      const q = getQuery();

      let filtered = allRows.filter(row => {
        if (selectedProgram && row.program !== selectedProgram) return false;
        if (!q) return true;
        const blob = [row.name,row.program,row.address,row.note].join(" ").toLowerCase();
        return blob.includes(q);
      });

      filtered = filtered.map(row => {
        const next = { ...row };
        const lat = toNumber(row.lat);
        const lng = toNumber(row.lng);

        if (currentLocation && lat != null && lng != null && isValidKoreaLatLng(lat,lng)){
          next._distance = haversineDistanceMeters(currentLocation.lat, currentLocation.lng, lat, lng);
        } else {
          next._distance = null;
        }
        return next;
      });

      if (sortByNearby && currentLocation){
        filtered.sort((a,b) => {
          const da = Number.isFinite(a._distance) ? a._distance : Number.POSITIVE_INFINITY;
          const db = Number.isFinite(b._distance) ? b._distance : Number.POSITIVE_INFINITY;
          return da - db;
        });
      }

      currentFilteredRows = filtered;

      if (selectedPlaceRow) {
        const exists = filtered.some(r => rowKey(r) === rowKey(selectedPlaceRow));
        if (!exists) selectedPlaceRow = null;
      }

      render(filtered);
    }

    function render(rows){
      clearMarkers();
      markerLookup = new Map();

      if (els.list) els.list.innerHTML = "";
      if (els.list_m) els.list_m.innerHTML = "";

      let validCount = 0;
      let invalidCount = 0;
      const bounds = new google.maps.LatLngBounds();

      const fragDesktop = document.createDocumentFragment();
      const fragMobile = document.createDocumentFragment();

      const listRows = selectedPlaceRow
        ? getSelectedContextRows(selectedPlaceRow, rows)
        : rows;

      for (const row of rows){
        const lat = toNumber(row.lat);
        const lng = toNumber(row.lng);
        if (lat == null || lng == null) continue;
        if (!isValidKoreaLatLng(lat,lng)){ invalidCount++; continue; }

        validCount++;
        const pos = { lat, lng };
        bounds.extend(pos);

        const marker = new google.maps.Marker({
          map,
          position: pos,
          title: row.name || ""
        });

        marker.addListener("click", () => {
          selectPlace(row, true);
        });

        markers.push(marker);
        markerLookup.set(rowKey(row), {
          marker,
          position: pos,
          row
        });
      }

      for (const listRow of listRows){
        const found = markerLookup.get(rowKey(listRow));
        if (!found) continue;

        fragDesktop.appendChild(
          createCardElement(listRow, found.position, found.marker)
        );

        fragMobile.appendChild(
          createCardElement(listRow, found.position, found.marker)
        );
      }

      if (els.list) els.list.appendChild(fragDesktop);
      if (els.list_m) els.list_m.appendChild(fragMobile);

      if (validCount >= 2 && !sortByNearby && !selectedPlaceRow){
        map.fitBounds(bounds);
      } else if (validCount === 1){
        const only = rows.find(item => {
          const lat = toNumber(item.lat);
          const lng = toNumber(item.lng);
          return lat != null && lng != null && isValidKoreaLatLng(lat, lng);
        });
        if (only){
          map.setCenter({ lat: Number(only.lat), lng: Number(only.lng) });
          map.setZoom(16);
        }
      } else if (validCount === 0){
        map.setCenter(CONFIG.DEFAULT_CENTER);
        map.setZoom(CONFIG.DEFAULT_ZOOM);
      }

      let message = `총 ${validCount}개 표시 중`;

      if (selectedPlaceRow) {
        message = `${selectedPlaceRow.name} 기준 가까운 맛집 10곳`;
      }

      if (selectedProgram) message += `\n필터: [${selectedProgram}]`;
      if (sortByNearby && currentLocation) message += `\n정렬: 내 위치 기준 가까운 순`;
      if (invalidCount > 0) message += `\n(좌표 이상값 ${invalidCount}개 제외)`;

      if (validCount === 0){
        message = "표시 가능한 데이터가 없습니다.\n필터/검색어 또는 좌표(lat/lng)를 확인하세요.";
      }

      setStatus(message);
    }

    function openSheet(){
      if (els.sheet) els.sheet.classList.add("open");
    }

    function closeSheet(){
      if (els.sheet) els.sheet.classList.remove("open");
    }

    function toggleSheet(){
      if (els.sheet) els.sheet.classList.toggle("open");
    }

    function bindSheetGesture(){
      if (!els.sheetHandle || !els.sheet) return;

      let startY = 0;
      let moved = false;

      const onStart = y => { startY = y; moved = false; };
      const onMove = y => { if (Math.abs(y - startY) > 12) moved = true; };
      const onEnd = y => {
        if (!moved) return toggleSheet();
        const dy = y - startY;
        if (dy > 60) closeSheet();
        else if (dy < -60) openSheet();
      };

      els.sheetHandle.addEventListener("click", toggleSheet);
      els.sheetHandle.addEventListener("touchstart", e => onStart(e.touches[0].clientY), { passive:true });
      els.sheetHandle.addEventListener("touchmove", e => onMove(e.touches[0].clientY), { passive:true });
      els.sheetHandle.addEventListener("touchend", e => {
        const t = e.changedTouches[0] || e.touches[0];
        if (t) onEnd(t.clientY);
      }, { passive:true });
    }

    async function moveToMyLocation(){
      if (!navigator.geolocation){
        alert("이 브라우저에서는 위치 기능을 지원하지 않습니다.");
        return;
      }

      const btn = els.myLocationBtn;
      const originalTitle = btn.title;

      try{
        btn.disabled = true;
        btn.title = "위치 찾는 중...";

        const position = await new Promise((resolve,reject) => {
          navigator.geolocation.getCurrentPosition(resolve,reject,{
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:300000
          });
        });

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const accuracy = Number(position.coords.accuracy || 0);

        currentLocation = { lat, lng };
        sortByNearby = true;

        map.panTo(currentLocation);
        map.setZoom(16);

        if (myLocationMarker) myLocationMarker.setMap(null);
        if (myLocationCircle) myLocationCircle.setMap(null);

        myLocationMarker = new google.maps.Marker({
          map,
          position: currentLocation,
          title:"내 위치",
          icon:{
            path: google.maps.SymbolPath.CIRCLE,
            scale: 9,
            fillColor:"#ef4444",
            fillOpacity:1,
            strokeColor:"#ffffff",
            strokeWeight:3
          }
        });

        if (accuracy > 0){
          myLocationCircle = new google.maps.Circle({
            map,
            center: currentLocation,
            radius: accuracy,
            fillColor:"#ef4444",
            fillOpacity:0.12,
            strokeColor:"#ef4444",
            strokeOpacity:0.4,
            strokeWeight:1
          });
        }

        updateNearbyButtons();
        applyFilter();
      } catch(e){
        console.error(e);
        alert("현재 위치를 가져오는 중 오류가 발생했습니다.");
      } finally{
        btn.disabled = false;
        btn.title = originalTitle;
      }
    }

    async function loadAndRender({force=false} = {}){
      try{
        if (els.reloadBtn) els.reloadBtn.disabled = true;
        if (els.reloadBtn_m) els.reloadBtn_m.disabled = true;
        setStatus(force ? "강제 새로고침 중…" : "시트 데이터 로딩 중…");

        allRows = await fetchSheetRows({ force });

        const programSet = new Set(allRows.map(r => r.program));
        if (selectedProgram && !programSet.has(selectedProgram)) selectedProgram = "";

        renderProgramChips();
        updateNearbyButtons();
        applyFilter();
      } catch(e){
        console.error(e);
        setStatus(String(e.message || e));
      } finally{
        if (els.reloadBtn) els.reloadBtn.disabled = false;
        if (els.reloadBtn_m) els.reloadBtn_m.disabled = false;
      }
    }

    function toggleNearbySort(){
      if (!currentLocation){
        alert("먼저 오른쪽 아래 내 위치 버튼을 눌러주세요.");
        return;
      }
      selectedPlaceRow = null;
      sortByNearby = !sortByNearby;
      updateNearbyButtons();
      applyFilter();
    }

    function bindUI(){
      const onInput = () => {
        selectedPlaceRow = null;
        applyFilter();
      };

      if (els.q) els.q.addEventListener("input", onInput);
      if (els.q_top_m) els.q_top_m.addEventListener("input", onInput);

      const onReload = async () => {
        clearCache();
        await loadAndRender({ force:true });
      };

      if (els.reloadBtn) els.reloadBtn.addEventListener("click", onReload);
      if (els.reloadBtn_m) els.reloadBtn_m.addEventListener("click", onReload);

      const clearAll = () => {
        selectedProgram = "";
        selectedPlaceRow = null;
        renderProgramChips();
        applyFilter();
      };

      if (els.allBtn) els.allBtn.addEventListener("click", clearAll);
      if (els.allBtn_m) els.allBtn_m.addEventListener("click", clearAll);

      if (els.nearbyBtn) els.nearbyBtn.addEventListener("click", toggleNearbySort);
      if (els.nearbyBtn_m) els.nearbyBtn_m.addEventListener("click", toggleNearbySort);

      if (els.myLocationBtn) els.myLocationBtn.addEventListener("click", moveToMyLocation);

      window.addEventListener("resize", syncQuery);

      if (isMobile()) closeSheet();
    }

    async function boot(){
      try{
        validateConfig();
        setStatus("지도 로딩 중…");
        bindSheetGesture();
        await loadGoogleMaps();
        initMap();
        bindUI();
        updateNearbyButtons();
        await loadAndRender({ force:false });
      } catch(e){
        console.error(e);
        setStatus(String(e.message || e));
      }
    }

    boot();
  </script>
</body>
</html>
