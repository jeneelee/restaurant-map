<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>맛집 지도</title>

  <style>
    :root{
      --border:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
      --panel-bg:#ffffff;
      --panel-shadow: 0 -10px 30px rgba(0,0,0,.12);
      --radius:16px;
      --btn-bg:#f9fafb;
      --btn-hover:#f3f4f6;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
    }

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;
      color:var(--text);
      background:#fff;
    }

    .wrap{
      display:grid;
      grid-template-columns: 380px 1fr;
      height:100vh;
      width:100%;
    }

    .side{
      border-right:1px solid var(--border);
      padding:14px;
      overflow:auto;
      background:var(--panel-bg);
    }

    .mapArea{
      position:relative;
      width:100%;
      height:100%;
    }

    #map{
      width:100%;
      height:100%;
    }

    .title{
      font-weight:900;
      font-size:18px;
      margin:0 0 10px;
    }

    .row{
      display:flex;
      gap:8px;
      margin:10px 0;
      align-items:center;
    }

    input{
      width:100%;
      padding:10px 10px;
      border:1px solid var(--border);
      border-radius:12px;
      outline:none;
      background:#fff;
    }

    button{
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--btn-bg);
      cursor:pointer;
      white-space:nowrap;
    }

    button:hover{
      background:var(--btn-hover);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .status{
      font-size:12px;
      color:var(--muted);
      margin:8px 0 12px;
      white-space:pre-line;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px;
      cursor:pointer;
      background:#fff;
    }

    .card:hover{
      background:#f9fafb;
    }

    .cardTitle{
      font-weight:900;
      font-size:15px;
    }

    .cardSub{
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
    }

    .cardYear{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }

    .meta{
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
      line-height:1.35;
    }

    .chipsRow{
      display:flex;
      gap:6px;
      overflow:auto;
      padding-bottom:2px;
    }

    .chipsRow::-webkit-scrollbar{
      height:6px;
    }

    .chipsRow::-webkit-scrollbar-thumb{
      background:#e5e7eb;
      border-radius:999px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      font-size:12px;
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      user-select:none;
      cursor:pointer;
      white-space:nowrap;
    }

    .chip:hover{
      background:#f9fafb;
    }

    .chip.active{
      background:#f3f4f6;
      border-color:#9ca3af;
      font-weight:900;
    }

    .chip.clear{
      background:#111827;
      color:#fff;
      border-color:#111827;
    }

    .chip.clear:hover{
      background:#0b1220;
    }

    .mapControls{
      position:absolute;
      top:14px;
      right:14px;
      z-index:10;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .mapControlBtn{
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(8px);
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    .mobile-topbar{
      display:none;
    }

    .sheet{
      display:none;
    }

    @media (max-width: 900px){
      .wrap{
        grid-template-columns: 1fr;
      }

      .side{
        display:none;
      }

      .mapArea,
      #map{
        height:100vh;
      }

      .mobile-topbar{
        display:flex;
        position:fixed;
        top:12px;
        left:12px;
        right:12px;
        z-index:11;
        gap:8px;
        pointer-events:none;
      }

      .mobile-topbar .pill{
        pointer-events:auto;
        display:flex;
        align-items:center;
        gap:10px;
        background:rgba(255,255,255,.92);
        border:1px solid rgba(229,231,235,.9);
        backdrop-filter:blur(8px);
        border-radius:999px;
        padding:10px 12px;
        box-shadow:0 10px 30px rgba(0,0,0,.12);
        width:100%;
      }

      .mobile-topbar .brand{
        font-weight:900;
        white-space:nowrap;
      }

      .mobile-topbar .openBtn{
        width:auto;
        border-radius:999px;
      }

      .sheet{
        display:block;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        z-index:12;
        background:var(--panel-bg);
        border-top-left-radius: var(--radius);
        border-top-right-radius: var(--radius);
        box-shadow: var(--panel-shadow);
        transform: translateY(calc(100% - 96px));
        transition: transform .22s ease;
        max-height:85vh;
        overflow:hidden;
      }

      .sheet.open{
        transform: translateY(0);
      }

      .sheet .handle{
        height:22px;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
      }

      .sheet .handle:before{
        content:"";
        width:44px;
        height:5px;
        border-radius:999px;
        background:#d1d5db;
      }

      .sheet .content{
        padding:0 14px 14px;
        overflow:auto;
        max-height:calc(85vh - 22px);
      }

      .mapControls{
        top:74px;
        right:12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="side">
      <h1 class="title">맛집 지도</h1>

      <div class="row">
        <input id="q" placeholder="검색 (가게명/프로그램/주소/메모)" />
      </div>

      <div class="row">
        <div class="chipsRow" id="programChips"></div>
      </div>

      <div class="row">
        <button id="allBtn" class="chip clear" type="button">전체</button>
        <div style="flex:1"></div>
        <button id="reloadBtn" type="button">새로고침</button>
      </div>

      <div id="status" class="status">로딩 준비 중…</div>
      <div class="list" id="list"></div>
    </aside>

    <main class="mapArea">
      <div class="mapControls">
        <button id="myLocationBtn" class="mapControlBtn" type="button">내 위치</button>
      </div>
      <div id="map"></div>
    </main>
  </div>

  <div class="mobile-topbar">
    <div class="pill">
      <div class="brand">맛집 지도</div>
      <div style="flex:1"></div>
      <button class="openBtn" id="openSheetBtn" type="button">목록</button>
    </div>
  </div>

  <section class="sheet" id="sheet" aria-label="목록 패널">
    <div class="handle" id="sheetHandle"></div>
    <div class="content">
      <div class="row" style="margin-top:8px;">
        <input id="q_m" placeholder="검색 (가게명/프로그램/주소/메모)" />
      </div>

      <div class="row">
        <div class="chipsRow" id="programChips_m"></div>
      </div>

      <div class="row">
        <button id="allBtn_m" class="chip clear" type="button">전체</button>
        <div style="flex:1"></div>
        <button id="reloadBtn_m" type="button">새로고침</button>
      </div>

      <div id="status_m" class="status">로딩 준비 중…</div>
      <div class="list" id="list_m"></div>
    </div>
  </section>

  <script>
    /* =========================================================
       1) 설정값 - 제일 위에서 쉽게 찾고 수정할 수 있게 배치
       ========================================================= */
    const CONFIG = {
      MAPS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",
      SHEETS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",
      SPREADSHEET_ID: "1zNSdIdZeJuUrD56NbYCdby7QGfoRMC-WzGsLHjpKLlo",

      SHEET_NAME: "DB",
      CACHE_TTL_MS: 2 * 60 * 1000,

      DEFAULT_CENTER: { lat: 37.5665, lng: 126.9780 },
      DEFAULT_ZOOM: 11,

      KOREA_BOUNDS: {
        latMin: 33.0,
        latMax: 39.8,
        lngMin: 124.0,
        lngMax: 132.5
      }
    };

    const RANGE_A1 = `${CONFIG.SHEET_NAME}!A1:I`;
    const CACHE_KEY = `restaurant_map_cache_v5__${CONFIG.SPREADSHEET_ID}__${CONFIG.SHEET_NAME}`;

    let map = null;
    let infoWindow = null;
    let myLocationMarker = null;

    let allRows = [];
    let markers = [];
    let selectedProgram = "";

    const els = {
      q: document.getElementById("q"),
      programChips: document.getElementById("programChips"),
      reloadBtn: document.getElementById("reloadBtn"),
      allBtn: document.getElementById("allBtn"),
      status: document.getElementById("status"),
      list: document.getElementById("list"),

      q_m: document.getElementById("q_m"),
      programChips_m: document.getElementById("programChips_m"),
      reloadBtn_m: document.getElementById("reloadBtn_m"),
      allBtn_m: document.getElementById("allBtn_m"),
      status_m: document.getElementById("status_m"),
      list_m: document.getElementById("list_m"),

      sheet: document.getElementById("sheet"),
      sheetHandle: document.getElementById("sheetHandle"),
      openSheetBtn: document.getElementById("openSheetBtn"),

      myLocationBtn: document.getElementById("myLocationBtn")
    };

    function isMobile() {
      return window.matchMedia("(max-width: 900px)").matches;
    }

    function setStatus(message) {
      els.status.textContent = message;
      els.status_m.textContent = message;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[ch]));
    }

    function toNumber(value) {
      const n = Number(String(value ?? "").trim());
      return Number.isFinite(n) ? n : null;
    }

    function safeJsonParse(text) {
      try {
        return JSON.parse(text);
      } catch {
        return null;
      }
    }

    function uniq(values) {
      return Array.from(
        new Set(
          values
            .filter(Boolean)
            .map(v => String(v).trim())
            .filter(Boolean)
        )
      );
    }

    function isValidKoreaLatLng(lat, lng) {
      const b = CONFIG.KOREA_BOUNDS;
      return lat >= b.latMin && lat <= b.latMax && lng >= b.lngMin && lng <= b.lngMax;
    }

    function openSheet() {
      els.sheet.classList.add("open");
    }

    function closeSheet() {
      els.sheet.classList.remove("open");
    }

    function toggleSheet() {
      els.sheet.classList.toggle("open");
    }

    function bindSheetGesture() {
      let startY = 0;
      let moved = false;

      const onStart = y => {
        startY = y;
        moved = false;
      };

      const onMove = y => {
        if (Math.abs(y - startY) > 12) moved = true;
      };

      const onEnd = y => {
        if (!moved) {
          toggleSheet();
          return;
        }
        const dy = y - startY;
        if (dy > 60) closeSheet();
        else if (dy < -60) openSheet();
      };

      els.sheetHandle.addEventListener("click", toggleSheet);
      els.openSheetBtn.addEventListener("click", openSheet);

      els.sheetHandle.addEventListener("touchstart", e => onStart(e.touches[0].clientY), { passive: true });
      els.sheetHandle.addEventListener("touchmove", e => onMove(e.touches[0].clientY), { passive: true });
      els.sheetHandle.addEventListener("touchend", e => {
        const touch = e.changedTouches[0] || e.touches[0];
        if (touch) onEnd(touch.clientY);
      }, { passive: true });
    }

    function readCache() {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;

      const parsed = safeJsonParse(raw);
      if (!parsed?.ts || !Array.isArray(parsed?.rows)) return null;
      if (Date.now() - parsed.ts > CONFIG.CACHE_TTL_MS) return null;

      return parsed.rows;
    }

    function writeCache(rows) {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        ts: Date.now(),
        rows
      }));
    }

    function clearCache() {
      localStorage.removeItem(CACHE_KEY);
    }

    function validateConfig() {
      const missing = [];
      if (!CONFIG.MAPS_API_KEY) missing.push("MAPS_API_KEY");
      if (!CONFIG.SHEETS_API_KEY) missing.push("SHEETS_API_KEY");
      if (!CONFIG.SPREADSHEET_ID) missing.push("SPREADSHEET_ID");

      if (missing.length) {
        throw new Error(
          "설정값이 비어 있습니다.\n" +
          `채워야 하는 항목: ${missing.join(", ")}`
        );
      }
    }

    function loadGoogleMaps() {
      return new Promise((resolve, reject) => {
        window.__initMap = () => resolve();

        const script = document.createElement("script");
        script.src =
          `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(CONFIG.MAPS_API_KEY)}&callback=__initMap`;
        script.async = true;
        script.onerror = () => reject(new Error("Google Maps JS 로딩 실패 (키/제한/네트워크 확인)"));

        document.head.appendChild(script);
      });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: CONFIG.DEFAULT_CENTER,
        zoom: CONFIG.DEFAULT_ZOOM,
        mapTypeControl: true,
        streetViewControl: false,
        fullscreenControl: true
      });

      infoWindow = new google.maps.InfoWindow();
    }

    function formatSheetsError(status, bodyText) {
      const json = safeJsonParse(bodyText);
      if (!json?.error) {
        return `Sheets API error: ${status}\n${bodyText}`;
      }
      return `Sheets API error: ${status}\n${json.error.message || bodyText}`;
    }

    async function fetchSheetRows({ force = false } = {}) {
      if (!force) {
        const cached = readCache();
        if (cached) return cached;
      }

      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(CONFIG.SPREADSHEET_ID)}` +
        `/values/${encodeURIComponent(RANGE_A1)}?key=${encodeURIComponent(CONFIG.SHEETS_API_KEY)}`;

      const res = await fetch(url);
      const bodyText = await res.text();

      if (!res.ok) {
        throw new Error(formatSheetsError(res.status, bodyText));
      }

      const json = safeJsonParse(bodyText) || {};
      const values = json.values || [];

      if (values.length < 2) {
        writeCache([]);
        return [];
      }

      const headers = (values[0] || []).map(h => String(h || "").trim().toLowerCase());
      const required = ["no","program","year","name","address","lat","lng","link","note"];

      for (const key of required) {
        if (!headers.includes(key)) {
          throw new Error(
            `시트 헤더에 "${key}"가 없습니다.\n현재 헤더: ${headers.join(", ")}`
          );
        }
      }

      const rows = values.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = (row[index] ?? "").toString().trim();
        });
        return obj;
      }).filter(item => item.program && item.name && item.lat && item.lng);

      writeCache(rows);
      return rows;
    }

    function syncQuery() {
      if (isMobile()) {
        els.q.value = els.q_m.value;
      } else {
        els.q_m.value = els.q.value;
      }
    }

    function getQuery() {
      return (isMobile() ? els.q_m.value : els.q.value).trim().toLowerCase();
    }

    function clearMarkers() {
      for (const marker of markers) {
        marker.setMap(null);
      }
      markers = [];
    }

    function openInfo(row, marker) {
      const link = (row.link || "").trim();
      const linkHtml = link
        ? `<div style="margin-top:8px;"><a href="${escapeHtml(link)}" target="_blank" rel="noopener">링크 열기</a></div>`
        : "";

      const html = `
        <div style="min-width:220px;max-width:340px;">
          <div style="font-weight:900;font-size:15px;">${escapeHtml(row.name || "")}</div>
          <div style="color:#6b7280;font-size:12px;margin-top:4px;">
            ${escapeHtml(row.program || "")}${row.year ? " · " + escapeHtml(row.year) : ""}
          </div>
          ${row.address ? `<div style="margin-top:6px;">${escapeHtml(row.address)}</div>` : ""}
          ${row.note ? `<div style="margin-top:6px;color:#374151;">${escapeHtml(row.note)}</div>` : ""}
          ${linkHtml}
        </div>
      `;

      infoWindow.setContent(html);
      infoWindow.open({ map, anchor: marker });
    }

    function createCardElement(row, position, marker) {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="cardTitle">${escapeHtml(row.name || "(가게명없음)")}</div>
        <div class="cardSub">${escapeHtml(row.program || "")}</div>
        <div class="cardYear">${row.year ? escapeHtml(row.year) : ""}</div>
        <div class="meta">${escapeHtml(row.address || "")}</div>
        ${row.note ? `<div class="meta">${escapeHtml(row.note)}</div>` : ""}
      `;

      div.addEventListener("click", () => {
        map.panTo(position);
        map.setZoom(Math.max(map.getZoom(), 15));
        openInfo(row, marker);

        if (isMobile()) {
          closeSheet();
        }
      });

      return div;
    }

    function renderProgramChips() {
      const programs = uniq(allRows.map(row => row.program)).sort((a, b) => a.localeCompare(b, "ko"));

      const buildChip = (label, active, onClick) => {
        const el = document.createElement("span");
        el.className = `chip${active ? " active" : ""}`;
        el.textContent = label;
        el.addEventListener("click", onClick);
        return el;
      };

      els.programChips.innerHTML = "";
      els.programChips_m.innerHTML = "";

      for (const program of programs) {
        els.programChips.appendChild(
          buildChip(program, selectedProgram === program, () => toggleProgram(program))
        );
        els.programChips_m.appendChild(
          buildChip(program, selectedProgram === program, () => toggleProgram(program))
        );
      }
    }

    function toggleProgram(program) {
      selectedProgram = (selectedProgram === program) ? "" : program;
      renderProgramChips();
      applyFilter();
    }

    function applyFilter() {
      syncQuery();

      const q = getQuery();
      const filtered = allRows.filter(row => {
        if (selectedProgram && row.program !== selectedProgram) return false;
        if (!q) return true;

        const blob = [row.name, row.program, row.address, row.note].join(" ").toLowerCase();
        return blob.includes(q);
      });

      render(filtered);
    }

    function render(rows) {
      clearMarkers();

      els.list.innerHTML = "";
      els.list_m.innerHTML = "";

      let validCount = 0;
      let invalidCount = 0;
      const bounds = new google.maps.LatLngBounds();

      const fragDesktop = document.createDocumentFragment();
      const fragMobile = document.createDocumentFragment();

      for (const row of rows) {
        const lat = toNumber(row.lat);
        const lng = toNumber(row.lng);

        if (lat == null || lng == null) continue;
        if (!isValidKoreaLatLng(lat, lng)) {
          invalidCount++;
          continue;
        }

        validCount++;

        const position = { lat, lng };
        bounds.extend(position);

        const marker = new google.maps.Marker({
          map,
          position,
          title: row.name || ""
        });

        marker.addListener("click", () => {
          openInfo(row, marker);
          if (isMobile()) openSheet();
        });

        markers.push(marker);

        fragDesktop.appendChild(createCardElement(row, position, marker));
        fragMobile.appendChild(createCardElement(row, position, marker));
      }

      els.list.appendChild(fragDesktop);
      els.list_m.appendChild(fragMobile);

      if (validCount >= 2) {
        map.fitBounds(bounds);
      } else if (validCount === 1) {
        const only = rows.find(item => {
          const lat = toNumber(item.lat);
          const lng = toNumber(item.lng);
          return lat != null && lng != null && isValidKoreaLatLng(lat, lng);
        });

        if (only) {
          map.setCenter({ lat: Number(only.lat), lng: Number(only.lng) });
          map.setZoom(16);
        }
      } else {
        map.setCenter(CONFIG.DEFAULT_CENTER);
        map.setZoom(CONFIG.DEFAULT_ZOOM);
      }

      let message = `총 ${validCount}개 표시 중`;
      if (selectedProgram) message += `\n필터: [${selectedProgram}]`;
      if (invalidCount > 0) message += `\n(좌표 이상값 ${invalidCount}개 제외)`;
      if (validCount === 0) {
        message = "표시 가능한 데이터가 없습니다.\n필터/검색어 또는 좌표(lat/lng)를 확인하세요.";
      }

      setStatus(message);
    }

    async function moveToMyLocation() {
      if (!navigator.geolocation) {
        alert("이 브라우저에서는 위치 기능을 지원하지 않습니다.");
        return;
      }

      const btn = els.myLocationBtn;
      const originalText = btn.textContent;

      try {
        btn.disabled = true;
        btn.textContent = "위치 찾는 중…";

        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 300000
          });
        });

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const current = { lat, lng };

        map.panTo(current);
        map.setZoom(16);

        if (myLocationMarker) {
          myLocationMarker.setMap(null);
        }

        myLocationMarker = new google.maps.Marker({
          map,
          position: current,
          title: "내 위치",
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 8,
            fillColor: "#4285F4",
            fillOpacity: 1,
            strokeColor: "#ffffff",
            strokeWeight: 2
          }
        });
      } catch (error) {
        console.error(error);

        if (error.code === 1) {
          alert("위치 권한이 거부되었습니다. 브라우저에서 위치 권한을 허용해주세요.");
        } else if (error.code === 2) {
          alert("현재 위치 정보를 가져올 수 없습니다.");
        } else if (error.code === 3) {
          alert("위치 요청 시간이 초과되었습니다.");
        } else {
          alert("현재 위치를 가져오는 중 오류가 발생했습니다.");
        }
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    async function loadAndRender({ force = false } = {}) {
      try {
        els.reloadBtn.disabled = true;
        els.reloadBtn_m.disabled = true;

        setStatus(force ? "강제 새로고침 중…" : "시트 데이터 로딩 중…");

        allRows = await fetchSheetRows({ force });

        const programSet = new Set(allRows.map(row => row.program));
        if (selectedProgram && !programSet.has(selectedProgram)) {
          selectedProgram = "";
        }

        renderProgramChips();
        applyFilter();
      } catch (error) {
        console.error(error);
        setStatus(String(error.message || error));
      } finally {
        els.reloadBtn.disabled = false;
        els.reloadBtn_m.disabled = false;
      }
    }

    function bindUI() {
      const onInput = () => applyFilter();
      els.q.addEventListener("input", onInput);
      els.q_m.addEventListener("input", onInput);

      const onReload = async () => {
        clearCache();
        await loadAndRender({ force: true });
      };
      els.reloadBtn.addEventListener("click", onReload);
      els.reloadBtn_m.addEventListener("click", onReload);

      const clearAll = () => {
        selectedProgram = "";
        renderProgramChips();
        applyFilter();
      };
      els.allBtn.addEventListener("click", clearAll);
      els.allBtn_m.addEventListener("click", clearAll);

      els.myLocationBtn.addEventListener("click", moveToMyLocation);

      window.addEventListener("resize", syncQuery);

      if (isMobile()) {
        closeSheet();
      }
    }

    async function boot() {
      try {
        validateConfig();
        setStatus("지도 로딩 중…");

        bindSheetGesture();
        await loadGoogleMaps();
        initMap();
        bindUI();
        await loadAndRender({ force: false });
      } catch (error) {
        console.error(error);
        setStatus(String(error.message || error));
      }
    }

    boot();
  </script>
</body>
</html>
