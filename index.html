<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>모두의맛집 지도</title>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    h2 { margin: 0; padding: 10px; }
    #map { height: 80vh; width: 100%; }
    .buttons { padding: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button { padding: 8px 12px; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    .status { font-size: 14px; color: #444; }
  </style>

  <!-- ✅ callback 사용 안 함: load 이벤트로만 초기화 (순서/충돌 문제 제거) -->
  <script
    id="naver-map-sdk"
    src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=snmf6afl0b"
    defer>
  </script>

  <script>
    // -----------------------------
    // 설정값
    // -----------------------------
    const SHEET_URL = "https://opensheet.elk.sh/1zNSdIdZeJuUrD56NbYCdby7QGfoRMC-WzGsLHjpKLlo/시트1";

    // -----------------------------
    // 상태값
    // -----------------------------
    let map;
    let markers = [];
    let allData = [];
    let infoWindow;

    const $ = (id) => document.getElementById(id);
    const norm = (v) => (v ?? "").toString().trim();

    // 컬럼명 유연 처리
    const getSource = (p) => p.source ?? p.Source ?? p["출처"];
    const getLat    = (p) => p.lat ?? p.Lat ?? p["위도"];
    const getLng    = (p) => p.lng ?? p.Lng ?? p["경도"];
    const getName   = (p) => p.name ?? p.Name ?? p["가게명"] ?? p["상호명"] ?? "";

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clearMarkers() {
      markers.forEach(m => m.setMap(null));
      markers = [];
      if (infoWindow) infoWindow.close();
    }

    async function loadData() {
      // 무한 대기 방지
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);

      try {
        const res = await fetch(SHEET_URL, { cache: "no-store", signal: controller.signal });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        allData = Array.isArray(data) ? data : [];
      } finally {
        clearTimeout(timer);
      }
    }

    function showBySource(type) {
      if (!allData.length) {
        alert("데이터 로딩 중입니다. 잠시 후 다시 눌러주세요.");
        return;
      }

      clearMarkers();

      // 공백/오타 대비: 완전일치가 필요하면 ===로 되돌리세요.
      const filtered = allData.filter(p => norm(getSource(p)) === type);

      filtered.forEach(p => {
        // 쉼표 들어간 숫자 대비
        const lat = parseFloat(String(getLat(p) ?? "").replaceAll(",", "").trim());
        const lng = parseFloat(String(getLng(p) ?? "").replaceAll(",", "").trim());
        if (Number.isNaN(lat) || Number.isNaN(lng)) return;

        const name = norm(getName(p)) || "(이름 없음)";

        const marker = new naver.maps.Marker({
          position: new naver.maps.LatLng(lat, lng),
          map,
          title: name
        });

        naver.maps.Event.addListener(marker, "click", () => {
          infoWindow.setContent(`
            <div style="padding:10px; max-width:240px;">
              <strong>${escapeHtml(name)}</strong><br>
              출처: ${escapeHtml(norm(getSource(p)))}
            </div>
          `);
          infoWindow.open(map, marker);
        });

        markers.push(marker);
      });

      $("status").textContent = `${type}: ${filtered.length}건 표시`;
      if (!filtered.length) console.warn("필터 결과 0건: 출처 값/공백/컬럼명 확인 필요");
    }

    // ✅ 핵심: SDK 스크립트가 '실행 완료'된 뒤에만 지도 초기화
    function bootAfterSdkLoaded() {
      const statusEl = $("status");
      const btnMichelin = $("btn-michelin");
      const btnTasty = $("btn-tasty");

      // SDK 실행이 정상이어야 naver가 존재
      if (typeof naver === "undefined") {
        statusEl.textContent = "지도 SDK 실행 실패(키/URL/차단/중복 로드 확인)";
        console.error("naver is undefined even after SDK load");
        return;
      }

      statusEl.textContent = "지도 초기화 중…";

      map = new naver.maps.Map("map", {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 12
      });

      infoWindow = new naver.maps.InfoWindow({ content: "" });

      // 버튼 이벤트는 데이터 로드 성공 후 활성화
      (async () => {
        try {
          statusEl.textContent = "데이터 로딩 중…";
          await loadData();

          statusEl.textContent = `데이터 ${allData.length}건 로드 완료`;
          btnMichelin.disabled = false;
          btnTasty.disabled = false;

          btnMichelin.onclick = () => showBySource("미슐랭");
          btnTasty.onclick = () => showBySource("맛있는녀석들");

          // 원하면 첫 화면 자동 표시
          // showBySource("미슐랭");
        } catch (e) {
          console.error(e);
          statusEl.textContent = "데이터 로드 실패(시트 공개/URL/네트워크 확인)";
          alert("데이터를 불러오지 못했습니다. 시트 공개 설정과 URL을 확인해주세요.");
        }
      })();
    }

    // defer 스크립트라도, load 이벤트로 '실행 완료' 시점을 보장
    window.addEventListener("DOMContentLoaded", () => {
      const sdk = $("naver-map-sdk");

      // SDK 로드 실패도 잡기
      sdk.addEventListener("error", () => {
        $("status").textContent = "maps.js 로드 실패(네트워크/차단/URL 확인)";
      });

      sdk.addEventListener("load", () => {
        // load는 "파일 다운로드" 타이밍이라, 다음 tick에서 실행 보장
        setTimeout(bootAfterSdkLoaded, 0);
      });
    });
  </script>
</head>

<body>
  <h2>모두의맛집! 지도</h2>

  <div class="buttons">
    <button id="btn-michelin" disabled>미슐랭</button>
    <button id="btn-tasty" disabled>맛있는녀석들</button>
    <span class="status" id="status">지도 SDK 로딩 중…</span>
  </div>

  <div id="map"></div>
</body>
</html>
