<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Google Map 최소 테스트</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100%; }
  </style>

  <script>
    // ✅ 구글이 호출하는 전역 콜백
    window.initMap = function () {
      const el = document.getElementById("map");
      const center = { lat: 37.5665, lng: 126.9780 };

      new google.maps.Map(el, {
        center,
        zoom: 12,
      });

      document.title = "GOOGLE MAP OK";
    };

    window.gm_authFailure = function () {
      alert("Google Maps 인증 실패(API 키/도메인 제한/결제 설정 확인)");
    };
  </script>

  <!-- ✅ async + defer + callback -->
  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCrVIUiTbbvJzzoj4W5agk26Dy-eTHz05w"
  ></script>
</head>
<body>
  <div id="map"></div>
</body>
</html>
