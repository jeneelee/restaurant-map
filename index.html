  <style>
    :root {
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --panel-bg: #ffffff;
      --panel-shadow: 0 -10px 30px rgba(0, 0, 0, .12);
      --radius: 16px;
      --btn-bg: #f9fafb;
      --btn-hover: #f3f4f6;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, Noto Sans KR, sans-serif;
      color: var(--text);
      background: #fff;
    }

    /* ===== PC layout ===== */
    .wrap {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
      width: 100%;
    }

    .side {
      border-right: 1px solid var(--border);
      padding: 14px;
      overflow: auto;
      background: var(--panel-bg);
    }

    .mapArea {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map { width: 100%; height: 100%; }

    .title {
      font-weight: 900;
      font-size: 18px;
      margin: 0 0 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin: 10px 0;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 10px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      background: #fff;
    }

    button {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--btn-bg);
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: var(--btn-hover); }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .status {
      font-size: 12px;
      color: var(--muted);
      margin: 8px 0 12px;
      white-space: pre-line;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      cursor: pointer;
      background: #fff;
    }
    .card:hover { background: #f9fafb; }

    .cardTop {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .cardTitle {
      font-weight: 900;
      font-size: 15px;
      line-height: 1.35;
    }

    .distanceBadge {
      flex: 0 0 auto;
      font-size: 11px;
      font-weight: 800;
      color: var(--danger);
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 999px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .cardSub { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .cardYear { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.35;
    }

    .chipsRow {
      display: flex;
      gap: 6px;
      overflow: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .chipsRow::-webkit-scrollbar { display: none; }

    .chip {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      user-select: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .chip.active {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1d4ed8;
      font-weight: 900;
    }

    .chip.clear {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .chip.sort.active {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #b91c1c;
    }

    /* map controls */
    .mapControls {
      position: absolute;
      right: 16px;
      bottom: 24px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mapIconBtn {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(229, 231, 235, .95);
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .18);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .mapIconBtn svg {
      width: 24px;
      height: 24px;
      display: block;
      fill: #111827;
    }

    .infoLinks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;

    .infoLinkBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border: 1px solid #d1d5db;

      background: #f9fafb;
      color: #111827;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }
    .infoLinkBtn:hover { background: #f3f4f6; }

    /* SEO 숨김 */
    .seo-hidden{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0, 0, 0, 0);
      white-space:nowrap;
      border:0;
    }

    /* ===== Mobile overlay UI ===== */
    .mobile-topbar { display: none; }
    .sheet { display: none; }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .side { display: none; }
      .mapArea, #map { height: 100vh; }

      /* ✅ 상단 고정 패널(작게, 카테고리 최우선) */
      .mobile-topbar{
        display:block;
        position: fixed;
        top: calc(10px + env(safe-area-inset-top));
        left: 10px;
        right: 10px;
        z-index: 9999;
        pointer-events: none;
      }

      .mobile-topbar .panel{
        pointer-events: auto;
        background: rgba(255,255,255,.92);
        border: 1px solid rgba(229,231,235,.9);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 10px;
        box-shadow: 0 10px 28px rgba(0,0,0,.12);
      }

      .mobile-topbar .topRow{
        display:flex;
        align-items:center;
        gap: 8px;
      }

      .mobile-topbar .brand{
        font-weight: 900;
        font-size: 15px;
        white-space: nowrap;
      }

      .mobile-topbar .miniBtn{
        padding: 8px 10px;
        border-radius: 999px;
      }

      .mobile-topbar input{
        font-size: 14px;
        padding: 10px 10px;
      }

      /* 칩 터치성 개선 */
      .mobile-topbar .chip{
        padding: 8px 12px;
        font-size: 13px;
      }

      /* ✅ 옵션은 기본 접힘 */
      .mobile-options{ display:none; }
      .mobile-options.open{ display:block; }

      /* ✅ sheet는 topbar 아래 레이어 + 기본 완전 닫힘(핸들만) */
      .sheet{
        display:block;
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9000;
        background: var(--panel-bg);
        border-top-left-radius: var(--radius);
        border-top-right-radius: var(--radius);
        box-shadow: var(--panel-shadow);
        transform: translateY(calc(100% - 22px)); /* ✅ 핸들만 보이게 */
        transition: transform .22s ease;
        max-height: 85vh;
        overflow: hidden;
      }

      .sheet.open { transform: translateY(0); }

      .sheet .handle{
        height: 22px;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor: pointer;
      }

      .sheet .handle:before{
        content:"";
        width: 44px;
        height: 5px;
        border-radius: 999px;
        background: #d1d5db;
      }

      .sheet .content{
        padding: 0 14px 14px;
        overflow: auto;
        max-height: calc(85vh - 22px);
      }

      /* 지도 버튼이 sheet에 가리지 않게 조금 올림 */
      .mapControls { right: 12px; bottom: 110px; }
    }
  </style>
</head>

<body>

  <!-- SEO용 텍스트 -->
  <section class="seo-hidden">
    <h2>전국 맛집 지도</h2>
    <p>전국 지역의 미쉐린 스타, 빕구르망, 방송 맛집을 지도에서 찾을 수 있습니다.</p>

  <script>
    const CONFIG = {
      MAPS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",      // ✅ 채우세요
      SHEETS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",    // ✅ 채우세요
      SPREADSHEET_ID: "1zNSdIdZeJuUrD56NbYCdby7QGfoRMC-WzGsLHjpKLlo",    // ✅ 채우세요
      SHEET_NAME: "DB",
      CACHE_TTL_MS: 2 * 60 * 1000,
      DEFAULT_CENTER: { lat: 37.5665, lng: 126.9780 },
      DEFAULT_ZOOM: 11,
      KOREA_BOUNDS: { latMin: 33.0, latMax: 39.8, lngMin: 124.0, lngMax: 132.5 }
    };

    const RANGE_A1 = `${CONFIG.SHEET_NAME}!A1:J`;
    const CACHE_KEY = `restaurant_map_cache_v11__${CONFIG.SPREADSHEET_ID}__${CONFIG.SHEET_NAME}`;

    let map = null;
    let infoWindow = null;
    let myLocationMarker = null;
    let myLocationCircle = null;
    let currentLocation = null;

    let allRows = [];
    let markers = [];
    let selectedProgram = "";
    let sortByNearby = false;

    const els = {
      q: document.getElementById("q"),
      q_m: document.getElementById("q_m"),
      programChips: document.getElementById("programChips"),
      programChips_m: document.getElementById("programChips_m"),
      reloadBtn: document.getElementById("reloadBtn"),
      reloadBtn_m: document.getElementById("reloadBtn_m"),
      allBtn: document.getElementById("allBtn"),
      allBtn_m: document.getElementById("allBtn_m"),
      nearbyBtn: document.getElementById("nearbyBtn"),
      nearbyBtn_m: document.getElementById("nearbyBtn_m"),
      status: document.getElementById("status"),
      status_m: document.getElementById("status_m"),
      list: document.getElementById("list"),
      list_m: document.getElementById("list_m"),
      sheet: document.getElementById("sheet"),
      sheetHandle: document.getElementById("sheetHandle"),
      openSheetBtn: document.getElementById("openSheetBtn"),
      myLocationBtn: document.getElementById("myLocationBtn"),
      toggleOptionsBtn: document.getElementById("toggleOptionsBtn"),
      mobileOptions: document.getElementById("mobileOptions"),
    };

    function isMobile() { return window.matchMedia("(max-width: 900px)").matches; }

    function setStatus(message) {
      if (els.status) els.status.textContent = message;
      if (els.status_m) els.status_m.textContent = message;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function toNumber(value) {
      const n = Number(String(value ?? "").trim());
      return Number.isFinite(n) ? n : null;
    }

    function safeJsonParse(text) { try { return JSON.parse(text); } catch { return null; } }

    function uniq(values) {
      return Array.from(new Set(values.filter(Boolean).map(v => String(v).trim()).filter(Boolean)));
    }

    function isValidKoreaLatLng(lat, lng) {
      const b = CONFIG.KOREA_BOUNDS;
      return lat >= b.latMin && lat <= b.latMax && lng >= b.lngMin && lng <= b.lngMax;
    }

    function formatDistance(meters) {
      if (!Number.isFinite(meters)) return "";
      if (meters < 1000) return `${Math.round(meters)}m`;
      return `${(meters / 1000).toFixed(1)}km`;
    }

    function haversineDistanceMeters(lat1, lng1, lat2, lng2) {
      const toRad = deg => deg * Math.PI / 180;
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function openSheet() { els.sheet.classList.add("open"); }
    function closeSheet() { els.sheet.classList.remove("open"); }
    function toggleSheet() { els.sheet.classList.toggle("open"); }

    function bindSheetGesture() {
      let startY = 0;
      let moved = false;

      const onStart = y => { startY = y; moved = false; };
      const onMove = y => { if (Math.abs(y - startY) > 12) moved = true; };
      const onEnd = y => {
        if (!moved) return toggleSheet();
        const dy = y - startY;
        if (dy > 60) closeSheet();
        else if (dy < -60) openSheet();
      };

      els.sheetHandle.addEventListener("click", toggleSheet);
      els.openSheetBtn.addEventListener("click", openSheet);

      els.sheetHandle.addEventListener("touchstart", e => onStart(e.touches[0].clientY), { passive: true });
      els.sheetHandle.addEventListener("touchmove", e => onMove(e.touches[0].clientY), { passive: true });
      els.sheetHandle.addEventListener("touchend", e => {
        const touch = e.changedTouches[0] || e.touches[0];
        if (touch) onEnd(touch.clientY);
      }, { passive: true });
    }

    function readCache() {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const parsed = safeJsonParse(raw);
      if (!parsed?.ts || !Array.isArray(parsed?.rows)) return null;
      if (Date.now() - parsed.ts > CONFIG.CACHE_TTL_MS) return null;
      return parsed.rows;
    }

    function writeCache(rows) { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), rows })); }
    function clearCache() { localStorage.removeItem(CACHE_KEY); }

    function validateConfig() {
      const missing = [];
      if (!CONFIG.MAPS_API_KEY) missing.push("MAPS_API_KEY");
      if (!CONFIG.SHEETS_API_KEY) missing.push("SHEETS_API_KEY");
      if (!CONFIG.SPREADSHEET_ID) missing.push("SPREADSHEET_ID");
      if (missing.length) throw new Error("설정값이 비어 있습니다.\n채워야 하는 항목: " + missing.join(", "));
    }

    function loadGoogleMaps() {
      return new Promise((resolve, reject) => {
        window.__initMap = () => resolve();
        const script = document.createElement("script");
        script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(CONFIG.MAPS_API_KEY)}&callback=__initMap`;
        script.async = true;
        script.onerror = () => reject(new Error("Google Maps JS 로딩 실패 (키/제한/네트워크 확인)"));
        document.head.appendChild(script);
      });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: CONFIG.DEFAULT_CENTER,
        zoom: CONFIG.DEFAULT_ZOOM,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        zoomControl: false,
        cameraControl: false,
        rotateControl: false,
        scaleControl: false,
        gestureHandling: "greedy"
      });
      infoWindow = new google.maps.InfoWindow();
    }

    function formatSheetsError(status, bodyText) {
      const json = safeJsonParse(bodyText);
      if (!json?.error) return `Sheets API error: ${status}\n${bodyText}`;
      return `Sheets API error: ${status}\n${json.error.message || bodyText}`;
    }

    async function fetchSheetRows({ force = false } = {}) {
      if (!force) {
        const cached = readCache();
        if (cached) return cached;
      }

      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(CONFIG.SPREADSHEET_ID)}` +
        `/values/${encodeURIComponent(RANGE_A1)}?key=${encodeURIComponent(CONFIG.SHEETS_API_KEY)}`;

      const res = await fetch(url);
      const bodyText = await res.text();
      if (!res.ok) throw new Error(formatSheetsError(res.status, bodyText));

      const json = safeJsonParse(bodyText) || {};
      const values = json.values || [];
      if (values.length < 2) { writeCache([]); return []; }

      const headers = (values[0] || []).map(h => String(h || "").trim().toLowerCase());
      const required = ["no","program","year","name","address","lat","lng","naver_link","google_link","note"];
      for (const key of required) {
        if (!headers.includes(key)) throw new Error(`시트 헤더에 "${key}"가 없습니다.\n현재 헤더: ${headers.join(", ")}`);
      }

      const rows = values.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => { obj[header] = (row[index] ?? "").toString().trim(); });
        return obj;
      }).filter(item => item.program && item.name && item.lat && item.lng);

      writeCache(rows);
      return rows;
    }

    function syncQuery() {
      if (!els.q || !els.q_m) return;
      if (isMobile()) els.q.value = els.q_m.value;
      else els.q_m.value = els.q.value;
    }

    function getQuery() {
      return (isMobile() ? els.q_m.value : els.q.value).trim().toLowerCase();
    }

    function clearMarkers() {
      for (const marker of markers) marker.setMap(null);
      markers = [];
    }

    function updateNearbyButtons() {
      els.nearbyBtn?.classList.toggle("active", sortByNearby);
      els.nearbyBtn_m?.classList.toggle("active", sortByNearby);

      const disabled = !currentLocation;
      if (els.nearbyBtn) els.nearbyBtn.disabled = disabled;
      if (els.nearbyBtn_m) els.nearbyBtn_m.disabled = disabled;
    }

    function buildMapLinks(row) {
      const naver = (row.naver_link || "").trim();
      const google = (row.google_link || "").trim();

      let html = `<div class="infoLinks">`;
      if (naver) html += `<a class="infoLinkBtn" href="${escapeHtml(naver)}" target="_blank" rel="noopener">네이버지도 열기</a>`;
      if (google) html += `<a class="infoLinkBtn" href="${escapeHtml(google)}" target="_blank" rel="noopener">구글지도 열기</a>`;
      html += `</div>`;
      return html;
    }

    function openInfo(row, marker) {
      const distanceHtml = Number.isFinite(row._distance)
        ? `<div style="margin-top:6px;color:#dc2626;font-weight:700;">현재 위치에서 ${escapeHtml(formatDistance(row._distance))}</div>`
        : "";
      const linkHtml = buildMapLinks(row);

      const html = `
        <div style="min-width:240px;max-width:360px;">
          <div style="font-weight:900;font-size:15px;">${escapeHtml(row.name || "")}</div>
          <div style="color:#6b7280;font-size:12px;margin-top:4px;">
            ${escapeHtml(row.program || "")}${row.year ? " · " + escapeHtml(row.year) : ""}
          </div>
          ${row.address ? `<div style="margin-top:6px;">${escapeHtml(row.address)}</div>` : ""}
          ${row.note ? `<div style="margin-top:6px;color:#374151;">${escapeHtml(row.note)}</div>` : ""}
          ${distanceHtml}
          ${linkHtml}
        </div>
      `;
      infoWindow.setContent(html);
      infoWindow.open({ map, anchor: marker });
    }

    function createCardElement(row, position, marker) {
      const div = document.createElement("div");
      div.className = "card";

      const distanceHtml = Number.isFinite(row._distance)
        ? `<div class="distanceBadge">${escapeHtml(formatDistance(row._distance))}</div>`
        : "";

      div.innerHTML = `
        <div class="cardTop">
          <div class="cardTitle">${escapeHtml(row.name || "(가게명없음)")}</div>
          ${distanceHtml}
        </div>
        <div class="cardSub">${escapeHtml(row.program || "")}</div>
        <div class="cardYear">${row.year ? escapeHtml(row.year) : ""}</div>
        <div class="meta">${escapeHtml(row.address || "")}</div>
        ${row.note ? `<div class="meta">${escapeHtml(row.note)}</div>` : ""}
      `;

      div.addEventListener("click", () => {
        map.panTo(position);
        map.setZoom(Math.max(map.getZoom(), 15));
        openInfo(row, marker);
        if (isMobile()) closeSheet();
      });

      return div;
    }

    function renderProgramChips() {
      // ✅ 가장 중요한 카테고리 상단 고정(원하는 이름으로 맞추세요)
      const PINNED = ["미쉐린 스타★", "미쉐린 빕 구르망", "먹을텐데", "또간집", "맛있는녀석들"];

      const programs = uniq(allRows.map(row => row.program)).sort((a, b) => {
        const ia = PINNED.indexOf(a);
        const ib = PINNED.indexOf(b);
        if (ia === -1 && ib === -1) return a.localeCompare(b, "ko");
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
      });

      const buildChip = (label, active, onClick) => {
        const el = document.createElement("span");
        el.className = `chip${active ? " active" : ""}`;
        el.textContent = label;
        el.addEventListener("click", onClick);
        return el;
      };

      els.programChips.innerHTML = "";
      els.programChips_m.innerHTML = "";

      for (const program of programs) {
        els.programChips.appendChild(buildChip(program, selectedProgram === program, () => toggleProgram(program)));
        els.programChips_m.appendChild(buildChip(program, selectedProgram === program, () => toggleProgram(program)));
      }
    }

    function toggleProgram(program) {
      selectedProgram = (selectedProgram === program) ? "" : program;
      renderProgramChips();
      applyFilter();
    }

    function toggleNearbySort() {
      if (!currentLocation) {
        alert("먼저 오른쪽 아래 내 위치 버튼을 눌러주세요.");
        return;
      }
      sortByNearby = !sortByNearby;
      updateNearbyButtons();
      applyFilter();
    }

    function applyFilter() {
      syncQuery();

      const q = getQuery();
      let filtered = allRows.filter(row => {
        if (selectedProgram && row.program !== selectedProgram) return false;
        if (!q) return true;
        const blob = [row.name, row.program, row.address, row.note].join(" ").toLowerCase();
        return blob.includes(q);
      });

      filtered = filtered.map(row => {
        const next = { ...row };
        const lat = toNumber(row.lat);
        const lng = toNumber(row.lng);

        if (currentLocation && lat != null && lng != null && isValidKoreaLatLng(lat, lng)) {
          next._distance = haversineDistanceMeters(currentLocation.lat, currentLocation.lng, lat, lng);
        } else {
          next._distance = null;
        }
        return next;
      });

      if (sortByNearby && currentLocation) {
        filtered.sort((a, b) => {
          const da = Number.isFinite(a._distance) ? a._distance : Number.POSITIVE_INFINITY;
          const db = Number.isFinite(b._distance) ? b._distance : Number.POSITIVE_INFINITY;
          return da - db;
        });
      }

      render(filtered);
    }

    function render(rows) {
      clearMarkers();
      els.list.innerHTML = "";
      els.list_m.innerHTML = "";

      let validCount = 0;
      let invalidCount = 0;
      const bounds = new google.maps.LatLngBounds();

      const fragDesktop = document.createDocumentFragment();
      const fragMobile = document.createDocumentFragment();

      for (const row of rows) {
        const lat = toNumber(row.lat);
        const lng = toNumber(row.lng);

        if (lat == null || lng == null) continue;
        if (!isValidKoreaLatLng(lat, lng)) { invalidCount++; continue; }

        validCount++;
        const position = { lat, lng };
        bounds.extend(position);

        const marker = new google.maps.Marker({ map, position, title: row.name || "" });

        marker.addListener("click", () => {
          openInfo(row, marker);
          if (isMobile()) openSheet();
        });

        markers.push(marker);
        fragDesktop.appendChild(createCardElement(row, position, marker));
        fragMobile.appendChild(createCardElement(row, position, marker));
      }

      els.list.appendChild(fragDesktop);
      els.list_m.appendChild(fragMobile);

      if (validCount >= 2 && !sortByNearby) map.fitBounds(bounds);
      else if (validCount >= 1 && sortByNearby && currentLocation) { map.panTo(currentLocation); map.setZoom(14); }
      else if (validCount === 1) {
        const only = rows.find(item => {
          const lat = toNumber(item.lat);
          const lng = toNumber(item.lng);
          return lat != null && lng != null && isValidKoreaLatLng(lat, lng);
        });
        if (only) { map.setCenter({ lat: Number(only.lat), lng: Number(only.lng) }); map.setZoom(16); }
      } else {
        map.setCenter(CONFIG.DEFAULT_CENTER);
        map.setZoom(CONFIG.DEFAULT_ZOOM);
      }

      let message = `총 ${validCount}개 표시 중`;
      if (selectedProgram) message += `\n필터: [${selectedProgram}]`;
      if (sortByNearby && currentLocation) message += `\n정렬: 내 위치 기준 가까운 순`;
      if (invalidCount > 0) message += `\n(좌표 이상값 ${invalidCount}개 제외)`;
      if (validCount === 0) message = "표시 가능한 데이터가 없습니다.\n필터/검색어 또는 좌표(lat/lng)를 확인하세요.";

      setStatus(message);
    }

    async function moveToMyLocation() {
      if (!navigator.geolocation) { alert("이 브라우저에서는 위치 기능을 지원하지 않습니다."); return; }

      const btn = els.myLocationBtn;
      const originalTitle = btn.title;

      try {
        btn.disabled = true;
        btn.title = "위치 찾는 중...";

        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 300000
          });
        });

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const accuracy = Number(position.coords.accuracy || 0);

        currentLocation = { lat, lng };
        sortByNearby = true;

        map.panTo(currentLocation);
        map.setZoom(16);

        if (myLocationMarker) myLocationMarker.setMap(null);
        if (myLocationCircle) myLocationCircle.setMap(null);

        myLocationMarker = new google.maps.Marker({
          map,
          position: currentLocation,
          title: "내 위치",
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 9,
            fillColor: "#ef4444",
            fillOpacity: 1,
            strokeColor: "#ffffff",
            strokeWeight: 3
          }
        });

        if (accuracy > 0) {
          myLocationCircle = new google.maps.Circle({
            map,
            center: currentLocation,
            radius: accuracy,
            fillColor: "#ef4444",
            fillOpacity: 0.12,
            strokeColor: "#ef4444",
            strokeOpacity: 0.4,
            strokeWeight: 1
          });
        }

        updateNearbyButtons();
        applyFilter();
      } catch (error) {
        console.error(error);
        if (error.code === 1) alert("위치 권한이 거부되었습니다. 브라우저에서 위치 권한을 허용해주세요.");
        else if (error.code === 2) alert("현재 위치 정보를 가져올 수 없습니다.");
        else if (error.code === 3) alert("위치 요청 시간이 초과되었습니다.");
        else alert("현재 위치를 가져오는 중 오류가 발생했습니다.");
      } finally {
        btn.disabled = false;
        btn.title = originalTitle;
      }
    }

    async function loadAndRender({ force = false } = {}) {
      try {
        els.reloadBtn.disabled = true;
        els.reloadBtn_m.disabled = true;
        setStatus(force ? "강제 새로고침 중…" : "시트 데이터 로딩 중…");

        allRows = await fetchSheetRows({ force });

        const programSet = new Set(allRows.map(row => row.program));
        if (selectedProgram && !programSet.has(selectedProgram)) selectedProgram = "";

        renderProgramChips();
        updateNearbyButtons();
        applyFilter();
      } catch (error) {
        console.error(error);
        setStatus(String(error.message || error));
      } finally {
        els.reloadBtn.disabled = false;
        els.reloadBtn_m.disabled = false;
      }
    }

    function bindUI() {
      const onInput = () => applyFilter();
      els.q.addEventListener("input", onInput);
      els.q_m.addEventListener("input", onInput);

      const onReload = async () => { clearCache(); await loadAndRender({ force: true }); };
      els.reloadBtn.addEventListener("click", onReload);
      els.reloadBtn_m.addEventListener("click", onReload);

      const clearAll = () => { selectedProgram = ""; renderProgramChips(); applyFilter(); };
      els.allBtn.addEventListener("click", clearAll);
      els.allBtn_m.addEventListener("click", clearAll);

      els.nearbyBtn.addEventListener("click", toggleNearbySort);
      els.nearbyBtn_m.addEventListener("click", toggleNearbySort);

      els.myLocationBtn.addEventListener("click", moveToMyLocation);

      window.addEventListener("resize", syncQuery);

      // ✅ 옵션 토글
      els.toggleOptionsBtn.addEventListener("click", () => {
        els.mobileOptions.classList.toggle("open");
      });

      // ✅ 모바일 기본은 sheet 닫힘 + 옵션 접힘
      if (isMobile()) {
        closeSheet();
        els.mobileOptions.classList.remove("open");
      }
    }

    async function boot() {
      try {
        validateConfig();
        setStatus("지도 로딩 중…");

        bindSheetGesture();
        await loadGoogleMaps();
        initMap();
        bindUI();
        updateNearbyButtons();
        await loadAndRender({ force: false });

        // ✅ 로딩 완료 후에도 모바일 sheet 강제 닫기(레이아웃 튐 방지)
        if (isMobile()) closeSheet();
      } catch (error) {
        console.error(error);
        setStatus(String(error.message || error));
      }
    }

    boot();
  </script>
</body>
</html>
