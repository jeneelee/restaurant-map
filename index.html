<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Naver Map</title>
  <style>
    #map { width: 100%; height: 100vh; }
    body { margin: 0; }
  </style>

  <script>
    // ✅ 반드시 전역(window)에 있어야 callback이 호출됩니다
    window.nmapInit = function () {
      // 콜백이 여기까지 오면 maps.js가 실행된 것
      document.title = "CALLBACK OK";

      // naver가 없으면 SDK 초기화 실패
      if (!window.naver || !naver.maps) {
        alert("콜백은 왔는데 naver 없음 (인증/차단/키 문제)");
        return;
      }

      new naver.maps.Map("map", {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 12
      });
    };
  </script>

  <script
    src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=snmf6afl0b&callback=nmapInit"
    defer
  ></script>
</head>
<body>
  <div id="map"></div>
</body>
</html>
