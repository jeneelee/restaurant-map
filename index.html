<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>전국 맛집 지도</title>

<style>
body{margin:0;font-family:sans-serif}
#map{width:100%;height:100vh}
</style>
</head>

<body>

<div id="map"></div>

<script>
const CONFIG = {
  MAPS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",
  SHEETS_API_KEY: "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI",
  SPREADSHEET_ID: "1zNSdIdZeJuUrD56NbYCdby7QGfoRMC-WzGsLHjpKLlo",
  SHEET_NAME: "DB"
};

let map;
let markers = [];

function loadGoogleMaps(){
  return new Promise((resolve,reject)=>{
    window.initMap = resolve;
    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.MAPS_API_KEY}&callback=initMap`;
    script.async = true;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

function initMap(){
  map = new google.maps.Map(document.getElementById("map"),{
    center:{lat:37.5665,lng:126.9780},
    zoom:12
  });
}

async function fetchData(){
  const url =
    `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}` +
    `/values/${CONFIG.SHEET_NAME}?key=${CONFIG.SHEETS_API_KEY}`;

  const res = await fetch(url);
  const json = await res.json();

  const rows = json.values;
  const headers = rows[0];

  return rows.slice(1).map(r=>{
    let obj={};
    headers.forEach((h,i)=>obj[h]=r[i]);
    return obj;
  });
}

function render(data){
  markers.forEach(m=>m.setMap(null));
  markers=[];

  data.forEach(row=>{
    const lat = Number(row.lat);
    const lng = Number(row.lng);

    if(!lat || !lng) return;

    const marker = new google.maps.Marker({
      map,
      position:{lat,lng},
      title:row.name
    });

    const info = new google.maps.InfoWindow({
      content:`<b>${row.name}</b><br>${row.address}`
    });

    marker.addListener("click",()=>{
      info.open(map,marker);
    });

    markers.push(marker);
  });
}

async function boot(){
  await loadGoogleMaps();
  initMap();

  const data = await fetchData();
  render(data);
}

boot();
</script>

</body>
</html>
