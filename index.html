<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>맛집 지도</title>
  <style>
    :root{
      --border:#e5e7eb; --text:#111827; --muted:#6b7280;
      --panel-bg:#ffffff; --panel-shadow: 0 -10px 30px rgba(0,0,0,.12);
      --radius:16px;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif; color:var(--text); }
    .wrap{ display:grid; grid-template-columns: 380px 1fr; height:100vh; }
    .side{ border-right:1px solid var(--border); padding:14px; overflow:auto; background:var(--panel-bg); }
    #map{ width:100%; height:100%; }

    .title{ font-weight:900; font-size:18px; margin:0 0 10px; }
    .row{ display:flex; gap:8px; margin:10px 0; align-items:center; }
    input{
      width:100%; padding:10px 10px;
      border:1px solid var(--border); border-radius:12px; outline:none; background:#fff;
    }
    button{
      padding:10px 12px; border:1px solid var(--border);
      border-radius:12px; background:#f9fafb; cursor:pointer; white-space:nowrap;
    }
    button:hover{ background:#f3f4f6; }
    button:disabled{ opacity:.6; cursor:not-allowed; }

    .status{ font-size:12px; color:var(--muted); margin:8px 0 12px; white-space:pre-line; }
    .list{ display:flex; flex-direction:column; gap:10px; }
    .card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px;
      cursor:pointer;
      background:#fff;
    }
    .card:hover{ background:#f9fafb; }

    /* ✅ 카드 표시 순서: name -> program -> year */
    .cardTitle{ font-weight:900; font-size:15px; } /* name */
    .cardSub{ color:var(--muted); font-size:12px; margin-top:6px; } /* program */
    .cardYear{ color:var(--muted); font-size:12px; margin-top:2px; } /* year */
    .meta{ color:var(--muted); font-size:12px; margin-top:6px; line-height:1.35; }

    .chipsRow{ display:flex; gap:6px; overflow:auto; padding-bottom:2px; }
    .chipsRow::-webkit-scrollbar{ height:6px; }
    .chipsRow::-webkit-scrollbar-thumb{ background:#e5e7eb; border-radius:999px; }
    .chip{
      display:inline-flex; align-items:center;
      font-size:12px; padding:6px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      user-select:none;
      cursor:pointer;
      white-space:nowrap;
    }
    .chip:hover{ background:#f9fafb; }
    .chip.active{ background:#f3f4f6; border-color:#9ca3af; font-weight:900; }
    .chip.clear{ background:#111827; color:#fff; border-color:#111827; }
    .chip.clear:hover{ background:#0b1220; }

    /* Mobile */
    .mobile-topbar{ display:none; }
    .sheet{ display:none; }

    @media (max-width: 900px){
      .wrap{ grid-template-columns: 1fr; }
      .side{ display:none; }
      #map{ height:100vh; }

      .mobile-topbar{
        display:flex;
        position:fixed;
        top:12px; left:12px; right:12px;
        z-index:5;
        gap:8px;
        pointer-events:none;
      }
      .mobile-topbar .pill{
        pointer-events:auto;
        display:flex; align-items:center; gap:10px;
        background:rgba(255,255,255,.92);
        border:1px solid rgba(229,231,235,.9);
        backdrop-filter: blur(8px);
        border-radius:999px;
        padding:10px 12px;
        box-shadow:0 10px 30px rgba(0,0,0,.12);
        width:100%;
      }
      .mobile-topbar .brand{ font-weight:900; white-space:nowrap; }
      .mobile-topbar .openBtn{ width:auto; border-radius:999px; }

      .sheet{
        display:block;
        position:fixed;
        left:0; right:0; bottom:0;
        z-index:6;
        background:var(--panel-bg);
        border-top-left-radius: var(--radius);
        border-top-right-radius: var(--radius);
        box-shadow: var(--panel-shadow);
        transform: translateY(calc(100% - 96px));
        transition: transform .22s ease;
        max-height: 85vh;
        overflow:hidden;
      }
      .sheet.open{ transform: translateY(0); }
      .sheet .handle{
        height:22px;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
      }
      .sheet .handle:before{
        content:"";
        width:44px; height:5px;
        border-radius:999px;
        background:#d1d5db;
      }
      .sheet .content{
        padding: 0 14px 14px;
        overflow:auto;
        max-height: calc(85vh - 22px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="side">
      <h1 class="title">맛집 지도</h1>

      <div class="row">
        <input id="q" placeholder="검색 (가게명/프로그램/주소/메모)" />
      </div>

      <!-- ✅ program만 필터 -->
      <div class="row"><div class="chipsRow" id="programChips"></div></div>

      <div class="row">
        <button id="allBtn" class="chip clear" type="button">전체</button>
        <div style="flex:1"></div>
        <button id="reloadBtn" type="button">새로고침</button>
      </div>

      <div id="status" class="status">로딩 준비 중…</div>
      <div class="list" id="list"></div>
    </aside>

    <main id="map"></main>
  </div>

  <div class="mobile-topbar">
    <div class="pill">
      <div class="brand">맛집 지도</div>
      <div style="flex:1"></div>
      <button class="openBtn" id="openSheetBtn" type="button">목록</button>
    </div>
  </div>

  <section class="sheet" id="sheet" aria-label="목록 패널">
    <div class="handle" id="sheetHandle"></div>
    <div class="content">
      <div class="row" style="margin-top:8px;">
        <input id="q_m" placeholder="검색 (가게명/프로그램/주소/메모)" />
      </div>

      <!-- ✅ program만 필터 -->
      <div class="row"><div class="chipsRow" id="programChips_m"></div></div>

      <div class="row">
        <button id="allBtn_m" class="chip clear" type="button">전체</button>
        <div style="flex:1"></div>
        <button id="reloadBtn_m" type="button">새로고침</button>
      </div>

      <div id="status_m" class="status">로딩 준비 중…</div>
      <div class="list" id="list_m"></div>
    </div>
  </section>

  <script>
    // === 키 3개만 수정 ===
    const MAPS_API_KEY   = "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI";
    const SHEETS_API_KEY = "AIzaSyCvTRT_Q498fX8wKOFqWUDzNol-Qq8-aUI";
    const SPREADSHEET_ID = "1zNSdIdZeJuUrD56NbYCdby7QGfoRMC-WzGsLHjpKLlo";

    const SHEET_NAME = "DB";
    const RANGE_A1 = `${SHEET_NAME}!A1:H`; // program,year,name,address,lat,lng,link,note

    const CACHE_KEY = `restaurant_map_cache_v3__${SPREADSHEET_ID}__${SHEET_NAME}`;
    const CACHE_TTL_MS = 2 * 60 * 1000;

    const KOREA_BOUNDS = { latMin: 33.0, latMax: 39.8, lngMin: 124.0, lngMax: 132.5 };

    let map, infoWindow;
    let allRows = [];
    let markers = [];

    // ✅ program만 필터
    let selectedProgram = "";

    const $q = document.getElementById("q");
    const $programChips = document.getElementById("programChips");
    const $reloadBtn = document.getElementById("reloadBtn");
    const $allBtn = document.getElementById("allBtn");
    const $status = document.getElementById("status");
    const $list = document.getElementById("list");

    const $q_m = document.getElementById("q_m");
    const $programChips_m = document.getElementById("programChips_m");
    const $reloadBtn_m = document.getElementById("reloadBtn_m");
    const $allBtn_m = document.getElementById("allBtn_m");
    const $status_m = document.getElementById("status_m");
    const $list_m = document.getElementById("list_m");

    const $sheet = document.getElementById("sheet");
    const $sheetHandle = document.getElementById("sheetHandle");
    const $openSheetBtn = document.getElementById("openSheetBtn");

    function isMobile(){ return window.matchMedia("(max-width: 900px)").matches; }
    function setStatus(msg){ $status.textContent = msg; $status_m.textContent = msg; }

    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }
    function toNumber(v){
      const n = Number(String(v ?? "").trim());
      return Number.isFinite(n) ? n : null;
    }
    function safeJsonParse(t){ try{ return JSON.parse(t); } catch { return null; } }

    function readCache(){
      const raw = localStorage.getItem(CACHE_KEY);
      if(!raw) return null;
      const parsed = safeJsonParse(raw);
      if(!parsed?.ts || !Array.isArray(parsed?.rows)) return null;
      if(Date.now() - parsed.ts > CACHE_TTL_MS) return null;
      return parsed.rows;
    }
    function writeCache(rows){ localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), rows })); }
    function clearCache(){ localStorage.removeItem(CACHE_KEY); }

    function isValidKoreaLatLng(lat,lng){
      return lat>=KOREA_BOUNDS.latMin && lat<=KOREA_BOUNDS.latMax && lng>=KOREA_BOUNDS.lngMin && lng<=KOREA_BOUNDS.lngMax;
    }

    // Mobile sheet
    function openSheet(){ $sheet.classList.add("open"); }
    function closeSheet(){ $sheet.classList.remove("open"); }
    function toggleSheet(){ $sheet.classList.toggle("open"); }
    (function(){
      let startY=0, moved=false;
      const onStart=y=>{ startY=y; moved=false; };
      const onMove=y=>{ if(Math.abs(y-startY)>12) moved=true; };
      const onEnd=y=>{
        if(!moved){ toggleSheet(); return; }
        const dy=y-startY;
        if(dy>60) closeSheet();
        else if(dy<-60) openSheet();
      };
      $sheetHandle.addEventListener("click", toggleSheet);
      $openSheetBtn.addEventListener("click", openSheet);
      $sheetHandle.addEventListener("touchstart", e=>onStart(e.touches[0].clientY), {passive:true});
      $sheetHandle.addEventListener("touchmove",  e=>onMove(e.touches[0].clientY),  {passive:true});
      $sheetHandle.addEventListener("touchend",   e=>onEnd((e.changedTouches[0]||e.touches[0]).clientY), {passive:true});
    })();

    // Maps
    function loadGoogleMaps(){
      return new Promise((resolve,reject)=>{
        window.__initMap = ()=>resolve();
        const s=document.createElement("script");
        s.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(MAPS_API_KEY)}&callback=__initMap`;
        s.async=true;
        s.onerror=()=>reject(new Error("Google Maps JS 로딩 실패 (키/제한/네트워크 확인)"));
        document.head.appendChild(s);
      });
    }
    function initMap(){
      map = new google.maps.Map(document.getElementById("map"), {
        center:{ lat:37.5665, lng:126.9780 }, zoom:11,
        mapTypeControl:true, streetViewControl:false, fullscreenControl:true,
      });
      infoWindow = new google.maps.InfoWindow();
    }

    function formatSheetsError(status, bodyText){
      const j = safeJsonParse(bodyText);
      if(!j?.error) return `Sheets API error: ${status}\n${bodyText}`;
      return `Sheets API error: ${status}\n${j.error.message || bodyText}`;
    }

    async function fetchSheetRows({force=false}={}){
      if(!force){
        const cached = readCache();
        if(cached) return cached;
      }

      const encodedRange = encodeURIComponent(RANGE_A1);
      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(SPREADSHEET_ID)}` +
        `/values/${encodedRange}?key=${encodeURIComponent(SHEETS_API_KEY)}`;

      const res = await fetch(url);
      const bodyText = await res.text();
      if(!res.ok) throw new Error(formatSheetsError(res.status, bodyText));

      const json = safeJsonParse(bodyText) || {};
      const values = json.values || [];
      if(values.length < 2){ writeCache([]); return []; }

      const headers = (values[0]||[]).map(h => String(h||"").trim().toLowerCase());
      const required = ["program","year","name","address","lat","lng","link","note"];
      for(const k of required){
        if(!headers.includes(k)){
          throw new Error(`시트 헤더에 "${k}"가 없습니다.\n현재 헤더: ${headers.join(", ")}`);
        }
      }

      const out = values.slice(1).map(r=>{
        const obj={};
        headers.forEach((h,i)=> obj[h]=(r[i]??"").toString().trim());
        return obj;
      }).filter(o => o.program && o.name && o.lat && o.lng);

      writeCache(out);
      return out;
    }

    function uniq(arr){
      return Array.from(new Set(arr.filter(Boolean).map(v=>String(v).trim()).filter(Boolean)));
    }

    // ✅ program 칩만 구성
    function renderProgramChips(){
      const programs = uniq(allRows.map(r=>r.program)).sort((a,b)=>a.localeCompare(b,"ko"));
      const makeChip=(label, active, onClick)=>{
        const el=document.createElement("span");
        el.className="chip"+(active?" active":"");
        el.textContent=label;
        el.addEventListener("click", onClick);
        return el;
      };

      $programChips.innerHTML="";
      $programChips_m.innerHTML="";
      programs.forEach(p=>{
        $programChips.appendChild(makeChip(p, selectedProgram===p, ()=>toggleProgram(p)));
        $programChips_m.appendChild(makeChip(p, selectedProgram===p, ()=>toggleProgram(p)));
      });
    }

    function toggleProgram(p){
      selectedProgram = (selectedProgram===p) ? "" : p;
      renderProgramChips();
      applyFilter();
    }

    function syncQuery(){
      if(isMobile()) $q.value = $q_m.value;
      else $q_m.value = $q.value;
    }
    function getQuery(){
      return (isMobile() ? $q_m.value : $q.value).trim().toLowerCase();
    }

    function clearMarkers(){
      markers.forEach(m=>m.setMap(null));
      markers=[];
    }

    function openInfo(r, marker){
      const link=(r.link||"").trim();
      const linkHtml = link ? `<div style="margin-top:8px;"><a href="${escapeHtml(link)}" target="_blank" rel="noopener">링크 열기</a></div>` : "";
      const html = `
        <div style="min-width:220px;max-width:320px;">
          <div style="font-weight:900;font-size:15px;">${escapeHtml(r.name||"")}</div>
          <div style="color:#6b7280;font-size:12px;margin-top:4px;">${escapeHtml(r.program||"")}${r.year ? " · " + escapeHtml(r.year) : ""}</div>
          ${r.address?`<div style="margin-top:6px;">${escapeHtml(r.address)}</div>`:""}
          ${r.note?`<div style="margin-top:6px;color:#374151;">${escapeHtml(r.note)}</div>`:""}
          ${linkHtml}
        </div>
      `;
      infoWindow.setContent(html);
      infoWindow.open({ map, anchor: marker });
    }

    function applyFilter(){
      syncQuery();
      const q=getQuery();

      const filtered = allRows.filter(r=>{
        if(selectedProgram && r.program!==selectedProgram) return false;

        if(!q) return true;
        // ✅ 표시/필터 기준도 program 중심 + name/address/note
        const blob=[r.name, r.program, r.address, r.note].join(" ").toLowerCase();
        return blob.includes(q);
      });

      render(filtered);
    }

    function render(rows){
      clearMarkers();
      $list.innerHTML=""; $list_m.innerHTML="";

      let valid=0, invalid=0;
      const bounds = new google.maps.LatLngBounds();

      const addCard=(container,r,pos,marker)=>{
        const div=document.createElement("div");
        div.className="card";
        // ✅ 카드: name -> program -> year
        div.innerHTML=`
          <div class="cardTitle">${escapeHtml(r.name||"(가게명없음)")}</div>
          <div class="cardSub">${escapeHtml(r.program||"")}</div>
          <div class="cardYear">${r.year ? escapeHtml(r.year) : ""}</div>
          <div class="meta">${escapeHtml(r.address||"")}</div>
          <div class="meta">${escapeHtml(r.note||"")}</div>
        `;
        div.addEventListener("click", ()=>{
          map.panTo(pos);
          map.setZoom(Math.max(map.getZoom(), 15));
          openInfo(r, marker);
          if(isMobile()) closeSheet();
        });
        container.appendChild(div);
      };

      rows.forEach(r=>{
        const lat=toNumber(r.lat), lng=toNumber(r.lng);
        if(lat==null || lng==null) return;
        if(!isValidKoreaLatLng(lat,lng)){ invalid++; return; }

        valid++;
        const pos={lat,lng};
        bounds.extend(pos);

        const marker=new google.maps.Marker({ map, position:pos, title:r.name||"" });
        marker.addListener("click", ()=>{ openInfo(r, marker); if(isMobile()) openSheet(); });
        markers.push(marker);

        addCard($list,r,pos,marker);
        addCard($list_m,r,pos,marker);
      });

      if(valid>=2) map.fitBounds(bounds);
      if(valid===1){
        const only=rows.find(rr=>{
          const la=toNumber(rr.lat), ln=toNumber(rr.lng);
          return la!=null && ln!=null && isValidKoreaLatLng(la,ln);
        });
        if(only){ map.setCenter({lat:Number(only.lat), lng:Number(only.lng)}); map.setZoom(16); }
      }

      let msg=`총 ${valid}개 표시 중`;
      if(selectedProgram) msg+=`\n필터: [${selectedProgram}]`;
      if(invalid>0) msg+=`\n(좌표 이상값 ${invalid}개 제외)`;
      if(valid===0) msg=`표시 가능한 데이터가 없습니다.\n필터/검색어 또는 좌표(lat/lng)를 확인하세요.`;
      setStatus(msg);
    }

    async function loadAndRender({force=false}={}){
      try{
        $reloadBtn.disabled=true; $reloadBtn_m.disabled=true;
        setStatus(force?"강제 새로고침 중…":"시트 데이터 로딩 중…");

        allRows = await fetchSheetRows({force});

        // 선택된 program이 데이터에서 사라졌으면 해제
        const pSet = new Set(allRows.map(r=>r.program));
        if(selectedProgram && !pSet.has(selectedProgram)) selectedProgram="";

        renderProgramChips();
        applyFilter();
      } catch(err){
        console.error(err);
        setStatus(String(err.message||err));
      } finally{
        $reloadBtn.disabled=false; $reloadBtn_m.disabled=false;
      }
    }

    function bindUI(){
      const onInput=()=>applyFilter();
      $q.addEventListener("input", onInput);
      $q_m.addEventListener("input", onInput);

      const onReload=async()=>{ clearCache(); await loadAndRender({force:true}); };
      $reloadBtn.addEventListener("click", onReload);
      $reloadBtn_m.addEventListener("click", onReload);

      const clearAll=()=>{ selectedProgram=""; renderProgramChips(); applyFilter(); };
      $allBtn.addEventListener("click", clearAll);
      $allBtn_m.addEventListener("click", clearAll);

      window.addEventListener("resize", syncQuery);
      if(isMobile()) closeSheet();
    }

    async function boot(){
      try{
        setStatus("지도 로딩 중…");
        await loadGoogleMaps();
        initMap();
        bindUI();
        await loadAndRender({force:false});
      } catch(err){
        console.error(err);
        setStatus(String(err.message||err));
      }
    }
    boot();
  </script>
</body>
</html>
